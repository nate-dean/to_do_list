<!DOCTYPE html>
<html lang="en">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <title>To Do List</title>
    </head>

    <body>
        <div class="main">

        <h1>To-Do List</h1>
        <hr>

        <div class="add_task_bar">  
        <input type="text" id="add_task" name="add_task" placeholder="Add a Task">
        <button id="add_task_button" aria-label="Add Task">+</button>
        </div>

        <div class="list">
        <ul id="display_task_list"></ul>
        </div>

        <div class="completed_list">
            <h3>>Completed</h3>

                <div class="completed_task">
                 <ul id="completed_task_list"></ul>
                </div>

        </div>


        </div>
        <script src="script.js" defer></script>
    </body>

</html>
